services:
  postgres:
    image: postgres:16-alpine
    profiles:
      - local-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-strapi}
      POSTGRES_USER: ${DATABASE_USERNAME:-strapi}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?Set DATABASE_PASSWORD in .env}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    image: ${BACKEND_IMAGE:-main-website-backend:local}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 1337
      DATABASE_CLIENT: ${DATABASE_CLIENT:-postgres}
      DATABASE_HOST: ${DATABASE_HOST:-postgres}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_NAME: ${DATABASE_NAME:-strapi}
      DATABASE_USERNAME: ${DATABASE_USERNAME:-strapi}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-strapi}
      DATABASE_SSL: ${DATABASE_SSL:-false}
      APP_KEYS: ${APP_KEYS:?Set APP_KEYS in .env}
      API_TOKEN_SALT: ${API_TOKEN_SALT:?Set API_TOKEN_SALT in .env}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:?Set ADMIN_JWT_SECRET in .env}
      TRANSFER_TOKEN_SALT: ${TRANSFER_TOKEN_SALT:?Set TRANSFER_TOKEN_SALT in .env}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?Set ENCRYPTION_KEY in .env}
    ports:
      - "${BACKEND_PORT:-1337}:1337"
    volumes:
      - strapi-uploads:/app/public/uploads

  frontend:
    image: ${FRONTEND_IMAGE:-main-website-frontend:local}
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      STRAPI_URL: ${STRAPI_URL:-http://backend:1337}
      STRAPI_PUBLIC_URL: ${STRAPI_PUBLIC_URL:-http://localhost:1337}
      STRAPI_HOME_SLUG: ${STRAPI_HOME_SLUG:-startseite}
      STRAPI_API_TOKEN: ${STRAPI_API_TOKEN:-}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

volumes:
  postgres-data:
  strapi-uploads:
